<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; font-src * data:; img-src * data: blob:; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval';">
    <title>WhatsApp Multi-Device Manager</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #008069;
            --text: #3b4a54;
            --secondary-text: #54656f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            color: var(--primary);
            text-align: center;
        }

        .add-session {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 250px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .session-card {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .session-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .status.connected { background: #dcf8c6; color: #075e54; }
        .status.connecting { background: #fff3cd; color: #856404; }
        .status.scan_qr { background: #cfe2ff; color: #084298; }
        .status.disconnected { background: #f8d7da; color: #721c24; }

        .qr-container {
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafafa;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        
        .qr-container img {
            max-width: 100%;
            max-height: 100%;
        }

        .delete-btn {
            background: #dc3545;
            padding: 5px 10px;
            font-size: 14px;
        }

        .test-msg-btn {
            background: #007bff;
            padding: 5px 10px;
            font-size: 14px;
            margin-right: 5px;
        }

        .logout-btn {
            background: #ffc107;
            color: #212529;
            padding: 5px 10px;
            font-size: 14px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WhatsApp Device Manager</h1>
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="/docs" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: bold;">View Documentation &rarr;</a>
        </div>

        <div style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <h3>Global Webhook</h3>
            <p style="font-size: 13px; color: #666; margin-bottom: 10px;">Used for all sessions unless overridden individually</p>
            <div style="display: flex; gap: 10px; justify-content: center; max-width: 500px; margin: 0 auto;">
                <input type="text" id="globalWebhook" placeholder="http://example.com/webhook" style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                <button onclick="saveGlobalWebhook()">Save</button>
            </div>
        </div>

        <div class="add-session">
            <input type="text" id="newSessionId" placeholder="Enter new Session ID (e.g. business-1)">
            <button onclick="createSession()">Add Device</button>
        </div>

        <div id="sessionsList" class="sessions-grid">
            <!-- Sessions will be loaded here -->
        </div>
    </div>

    <script>
        const sessionsList = document.getElementById('sessionsList');
        const globalWebhookInput = document.getElementById('globalWebhook');

        async function init() {
            await fetchGlobalWebhook();
            await fetchSessions();
            setInterval(fetchSessions, 2000);
        }

        async function fetchGlobalWebhook() {
            try {
                const res = await fetch('/api/settings/webhook');
                const data = await res.json();
                if (data.url) globalWebhookInput.value = data.url;
            } catch(err) {
                console.error('Failed to load global webhook');
            }
        }

        async function saveGlobalWebhook() {
            const url = globalWebhookInput.value.trim();
            if (!url) return alert('Please enter a URL');
            
            try {
                const res = await fetch('/api/settings/webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                if (res.ok) alert('Global webhook updated');
                else alert('Failed to update');
            } catch(err) {
                alert('Error updating global webhook');
            }
        }

        async function fetchSessions() {
            try {
                const res = await fetch('/api/sessions');
                const sessions = await res.json();
                renderSessions(sessions);
            } catch (err) {
                console.error(err);
            }
        }

        function renderSessions(sessions) {
            sessionsList.innerHTML = '';
            for (const [id, data] of Object.entries(sessions)) {
                const card = document.createElement('div');
                card.className = 'session-card';
                
                let qrContent = '<div style="color:#aaa">Waiting for QR...</div>';
                if (data.status === 'connected') {
                    qrContent = '<div style="font-size: 40px;">✅</div><div>Connected</div>';
                } else if (data.qr) {
                    qrContent = `<img src="${data.qr}" alt="QR Code">`;
                } else if (data.status === 'connecting') {
                     qrContent = '<div style="color:#aaa">Connecting...</div>';
                }

                card.innerHTML = `
                    <div class="session-title">${id}</div>
                    <span class="status ${data.status}">${data.status}</span>
                <div class="qr-container">
                        ${qrContent}
                    </div>
                    
                    <div style="margin-bottom: 15px; text-align: left;">
                        <label style="font-size: 12px; display: block; margin-bottom: 4px;">Webhook URL</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="webhook-${id}" value="${data.webhookUrl || ''}" placeholder="http://..." style="flex: 1; padding: 5px; font-size: 14px; width: auto;">
                            <button onclick="saveWebhook('${id}')" style="padding: 5px 10px; font-size: 12px; background: #6c757d;">Save</button>
                        </div>
                    </div>

                    <div>
                        <button class="test-msg-btn" onclick="testMessage('${id}')">Test Msg</button>
                        ${data.status === 'connected' ? 
                            `<button class="logout-btn" onclick="logoutSession('${id}')">Logout</button>` : ''}
                        <button class="delete-btn" onclick="deleteSession('${id}')">Remove Device</button>
                    </div>
                `;
                sessionsList.appendChild(card);
            }
        }

        async function createSession() {
            const id = document.getElementById('newSessionId').value.trim();
            if (!id) return alert('Please enter an ID');
            
            try {
                await fetch('/api/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId: id })
                });
                document.getElementById('newSessionId').value = '';
                fetchSessions();
            } catch (err) {
                alert('Error creating session');
            }
        }

        async function logoutSession(id) {
            if (!confirm('Are you sure you want to logout?')) return;
            await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
            fetchSessions();
        }

        async function deleteSession(id) {
            if (!confirm('Are you sure you want to remove this device?')) return;
            await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
            fetchSessions();
        }

        async function saveWebhook(id) {
            const url = document.getElementById(`webhook-${id}`).value.trim();
            if (!url) return alert('Please enter a URL');

            try {
                const res = await fetch(`/api/sessions/${id}/webhook`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                if (res.ok) {
                    alert('Webhook updated');
                } else {
                    alert('Failed to update webhook');
                }
            } catch (err) {
                console.error(err);
                alert('Error updating webhook');
            }
        }

        async function testMessage(id) {
            const jid = prompt("Enter phone number to send test message (e.g., 628123456789@s.whatsapp.net)");
            if (!jid) return;
            
            try {
                const res = await fetch(`/api/sessions/${id}/send-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jid,
                        message: { text: "Hello from Baileys Manager!" }
                    })
                });
                const data = await res.json();
                alert(JSON.stringify(data));
            } catch (err) {
                alert('Failed to send');
            }
        }

        // Poll every 2 seconds
        init();
    </script>
</body>
</html>
